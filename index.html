<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIT-EFETIVO // LOGISTICS V9.9</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:ital,wght@0,300;0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    /* MODO DARK (Padrão ) */
    --bg: #0F172A;
    --text: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.7); /* Adicionado para consistência */
    --surface: rgba(255, 255, 255, 0.02);
    --line: rgba(255, 255, 255, 0.07);
    --accent: #ffffff;
    --danger: #ff3b30;
    --success: #34c759;
    --info: #00b4ff;
    --input-bg: rgba(255, 255, 255, 0.02);
    --premium-shadow: 0 20px 60px rgba(0,0,0,0.9);
    --card-radius: 14px;
    --btn-radius: 8px;
}

[data-theme="light"] {
    /* MODO LIGHT: CALIBRAÇÃO PREMIUM "SILVER & SILK" */
    --bg: #E8EDF2;           /* Camada 0: Fundo (Cinza-azulado muito claro, base serena) */
    --surface: #FFFFFF;      /* Camada 1: O Card/Superfície (Branco puro, com elevação sutil) */
    --input-bg: #F5F7FA;     /* Camada 2: Inputs/Elementos Interativos (Cinza quase branco, textura suave) */
    --text: #2C3E50;         /* Camada 3: Texto Principal (Azul-marinho escuro, legibilidade premium) */
    --text-secondary: #7F8C8D; /* Texto Secundário (Cinza médio-azulado, para hierarquia suave) */
    --line: #DCE4EC;         /* Linhas/Bordas (Cinza-azulado muito claro, separação elegante) */
    --accent: #3498DB;       /* Cor de Destaque/Interativa (Azul celeste vibrante, mas refinado) */
    --danger: #E74C3C;       /* Perigo (Vermelho clássico, com bom contraste) */
    --success: #2ECC71;      /* Sucesso (Verde fresco, otimizado para clareza) */
    --info: #3498DB;         /* Informação (Mesmo azul do accent para consistência) */
    --premium-shadow: 0 6px 20px rgba(0,0,0,0.06); /* Sombra difusa e etérea, para profundidade sutil */
    --card-radius: 10px;     /* Raio de borda para cards, moderno e suave */
    --btn-radius: 5px;       /* Raio de borda para botões, em harmonia com cards */
}

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .premium-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; padding: 25px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1.5px solid var(--line); flex-shrink: 0; }
        .system-tag { font-style: italic; text-transform: uppercase; letter-spacing: 6px; font-weight: 900; font-size: 0.5rem; opacity: 0.9; color: var(--danger); /* Usa o laranja-avermelhado do sistema */}
        #clock { font-family: 'JetBrains Mono'; font-weight: 300; font-size: 1.8rem; letter-spacing: -2px; color: var(--info); }

        .main-layout { display: grid; grid-template-columns: 310px 1fr 380px; gap: 25px; flex-grow: 1; overflow: hidden; margin-top: 25px; }
        .scroll-area { height: 100%; overflow-y: auto; padding-right: 8px; scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
        
        .card-base { background: var(--surface); border: 1px solid var(--line); border-radius: var(--card-radius); box-shadow: var(--premium-shadow); padding: 22px; transition: 0.3s; }
        
        .field-label { font-size: 0.5rem; font-weight: 900; opacity: 0.4; text-transform: uppercase; letter-spacing: 2px; font-style: italic; margin-bottom: 8px; display: block; }
        input, select { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--line); color: var(--text); font-size: 0.8rem; border-radius: 8px; margin-bottom: 12px; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--info); background: var(--surface); }
        
        nav { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .nav-btn { background: transparent; color: var(--text); border: 1px solid var(--line); text-align: left; padding: 18px; font-size: 0.65rem; font-weight: 900; border-radius: var(--btn-radius); cursor: pointer; transition: 0.2s; text-transform: uppercase; font-style: italic; opacity: 0.4; }
        .nav-btn.active { opacity: 1; border-left: 5px solid var(--info); background: linear-gradient(90deg, rgba(0,180,255,0.05) 0%, transparent 100%); }

        .btn-action { background: var(--text); color: var(--bg); border: none; width: 100%; padding: 16px; font-weight: 900; text-transform: uppercase; border-radius: var(--btn-radius); cursor: pointer; font-size: 0.7rem; letter-spacing: 1.5px; font-style: italic; }
        .btn-reset { background: transparent; border: 2px solid var(--danger); color: var(--danger); width: 100%; padding: 16px; font-weight: 900; text-transform: uppercase; border-radius: var(--btn-radius); cursor: pointer; font-size: 0.7rem; margin-top: 20px; }

        .row-item { border-bottom: 1px solid var(--line); border-left: 6px solid transparent; transition: 0.2s; background: transparent; }
        .row-item.status-disponivel { border-left-color: var(--success); }
        .row-item.status-ausente { border-left-color: var(--danger); background: rgba(215, 0, 21, 0.04); }
        .row-item.status-escalado { border-left-color: var(--line); opacity: 0.35; filter: grayscale(1); }

        .agent-main { font-weight: 800; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .agent-main:hover { color: var(--info); }
        .agent-main::after { content: '✎'; font-size: 0.6rem; opacity: 0; color: var(--info); }
        .row-item:hover .agent-main::after { opacity: 1; }
        
        .agent-sub { color: var(--text); opacity: 0.4; font-size: 0.62rem; font-family: 'JetBrains Mono'; margin-top: 4px; cursor: copy; transition: 0.2s; display: inline-block; }
        .agent-sub:hover { opacity: 1; color: var(--info); }

        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .mini-card { padding: 22px; background: rgba(0,0,0,0.05); border-radius: 12px; border: 1px solid var(--line); position: relative; }
        .metric-val { font-family: 'JetBrains Mono'; font-size: 2.2rem; font-weight: 700; letter-spacing: -2px; display: block; margin-top: 10px; }
        .metric-per { font-family: 'JetBrains Mono'; font-size: 0.6rem; font-weight: 900; opacity: 0.3; font-style: italic; }

        .toast { position: fixed; bottom: 40px; right: 40px; background: var(--text); color: var(--bg); padding: 16px 32px; font-weight: 900; font-size: 0.7rem; border-radius: 10px; display: none; z-index: 200; border-left: 5px solid var(--info); font-family: 'JetBrains Mono'; box-shadow: var(--premium-shadow); }
        .undo-btn { margin-left: 15px; color: var(--info); background: transparent; border: 1px solid var(--info); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.55rem; font-weight: 900; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .modal-content { background: var(--bg); margin: 7% auto; padding: 45px; width: 480px; border: 1px solid var(--line); border-radius: var(--card-radius); position: relative; }

        @keyframes copyFlash { 0% { background-color: var(--info); color: white; } 100% { background-color: transparent; } }
        .copy-active { animation: copyFlash 0.4s ease-out; }
    </style>
</head>
<body>

<div id="toast" class="toast">
    <span id="toastMsg">DADO_COPIADO</span>
    <button id="undoBtn" class="undo-btn" onclick="App.undo()">[DESFAZER]</button>
</div>

<div id="modalReports" class="modal">
    <div class="modal-content">
        <div id="modalTitle" class="field-label" style="color:var(--info); font-size: 0.6rem; margin-bottom: 20px;">RELATÓRIO_SISTEMA</div>
        <div id="reportList" style="background:rgba(0,0,0,0.3); padding:25px; font-family:'JetBrains Mono'; font-size:0.75rem; border-radius:12px; max-height:350px; overflow-y:auto; line-height:1.8; border:1px solid var(--line);"></div>
        <button class="btn-action" style="margin-top: 25px;" onclick="document.getElementById('modalReports').style.display='none'">FECHAR_RELATORIO</button>
    </div>
</div>

<div class="premium-container">
    <header class="header">
        <div><div class="system-tag">"NIT-EFETIVO-LOGISTICS // O SILÊNCIO DAS SOMBRAS É O ECO DA PRÓPRIA LUZ"</div><div id="clock">00:00:00</div></div>
        <div style="display:flex; gap: 12px;">
            <button class="nav-btn" style="padding: 10px 20px; opacity: 1;" onclick="toggleTheme()">INTERFACE</button>
            <button class="nav-btn" style="padding: 10px 20px; opacity: 1;" onclick="document.getElementById('importFile').click()">IMPORTAR</button>
            <input type="file" id="importFile" style="display: none;" accept=".json" onchange="App.importar(this)">
            <button class="nav-btn" style="padding: 10px 20px; opacity: 1;" onclick="exportarDados()">EXPORTAR</button>
        </div>
    </header>

    <div class="main-layout">
        <aside class="side-bar scroll-area">
            <div class="card-base">
                <span class="field-label">CONTROLE_CENTRAL</span>
                <input type="text" id="mainSearch" onkeyup="UI.render()" placeholder="FILTRAR LISTA...">
                <select id="newTurno">
                    <option value="OPERAÇÃO GERAL">EQUIPE OPERAÇÃO GERAL</option>
                    <option value="GEDUC">SETOR GEDUC (EXCEÇÃO)</option>
                </select>
                <input type="text" id="newNome" placeholder="NOME COMPLETO">
                <input type="text" id="newTel" placeholder="IDENTIFICAÇÃO (TEL)">
                <input type="text" id="newBairro" placeholder="BAIRRO ATUANTE">
                <select id="newTransp">
                    <option value="PRÓPRIO">TRANSPORTE: PRÓPRIO</option>
                    <option value="COLETIVO">TRANSPORTE: COLETIVO</option>
                </select>
                <button class="btn-action" onclick="App.addAgent()">ADICIONAR À BASE</button>
            </div>
            <nav>
                <button id="btnRotina" class="nav-btn active" onclick="UI.setTab('rotina')">01_EQUIPE_ROTINA</button>
                <button id="btnGeduc" class="nav-btn" onclick="UI.setTab('geduc')">02_EQUIPE_GEDUC</button>
                <button id="btnReserva" class="nav-btn" onclick="UI.setTab('reserva')">03_BANCO_RESERVA</button>
                <button class="nav-btn" onclick="UI.abrirLista('selecionados')">📋 VER_ESCALADOS</button>
            </nav>
            <button class="btn-reset" onclick="App.resetShift()">REINICIAR ESCALA</button>
        </aside>

        <main class="table-panel card-base scroll-area">
            <span class="field-label" style="margin-bottom: 20px;">FLOW_OPERACIONAL // DBL-CLICK PARA EDITAR</span>
            <table style="width: 100%; border-collapse: collapse;"><tbody id="corpoTabela"></tbody></table>
        </main>

        <aside class="dash-panel scroll-area">
            <div class="card-base">
                <span class="field-label" style="margin-bottom: 15px;">TELEMETRIA_LOGÍSTICA</span>
                <div class="dash-grid">
                    <div class="mini-card">
                        <span class="field-label" style="font-size:0.5rem;">TOTAL</span>
                        <div id="valTotal" class="metric-val">0</div>
                        <div class="metric-per">.....</div>
                    </div>
                    <div class="mini-card">
                        <span class="field-label" style="font-size:0.5rem; color:var(--danger);">AUSÊNCIA</span>
                        <div id="valAusen" class="metric-val" style="color:var(--danger);">0%</div>
                        <div id="perAusen" class="metric-per">AUSENTES: 0</div>
                    </div>
                    <div class="mini-card">
                        <span class="field-label" style="font-size:0.5rem; color:var(--info);">ESCALADOS</span>
                        <div id="valEscala" class="metric-val" style="color:var(--info);">0</div>
                        <div id="perEscala" class="metric-per">0%</div>
                    </div>
                    <div class="mini-card">
                        <span class="field-label" style="font-size:0.5rem; color:var(--success);">DISPONÍVEIS</span>
                        <div id="valDisp" class="metric-val" style="color:var(--success);">0</div>
                        <div id="perDisp" class="metric-per">0%</div>
                    </div>
                </div>
            </div>
            <div class="card-base" style="margin-top: 25px;">
                <span class="field-label">DISTRIBUIÇÃO_POR_STATUS</span>
                <div style="height: 180px; margin-top: 20px;"><canvas id="statusChart"></canvas></div>
            </div>
        </aside>
    </div>
</div>

<script>
    const App = {
        data: { ativos: JSON.parse(localStorage.getItem('vl_ativos')) || [], reserva: JSON.parse(localStorage.getItem('vl_reserva')) || [] },
        history: null,
        save(withHistory = true) { 
            if(withHistory) this.history = JSON.stringify(this.data);
            localStorage.setItem('vl_ativos', JSON.stringify(this.data.ativos)); 
            localStorage.setItem('vl_reserva', JSON.stringify(this.data.reserva)); 
            UI.render(); 
        },
        undo() { if(!this.history) return; this.data = JSON.parse(this.history); this.history = null; this.save(false); UI.toast("AÇÃO_REVERTIDA", false); },
        addAgent() {
            const n = document.getElementById('newNome').value.trim().toUpperCase();
            if(!n) return;
            this.data.ativos.unshift({ t: document.getElementById('newTurno').value, n, tel: document.getElementById('newTel').value.trim() || "S/N", bairro: document.getElementById('newBairro').value.trim().toUpperCase() || "N/D", transp: document.getElementById('newTransp').value, s: "disponivel", obs: "" });
            ['newNome', 'newTel', 'newBairro'].forEach(id => document.getElementById(id).value = '');
            this.save(); UI.toast("REGISTRO_SALVO");
        },
        importar(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const d = JSON.parse(e.target.result);
                    if(d.ativos) this.data.ativos = d.ativos;
                    if(d.reserva) this.data.reserva = d.reserva;
                    this.save(); UI.toast("BASE_IMPORTADA", false);
                } catch(err) { alert("ERRO_JSON_INVALIDO"); }
            };
            reader.readAsText(file); input.value = '';
        },
        editAgent(idx) {
            const list = UI.currentTab === 'reserva' ? this.data.reserva : this.data.ativos;
            const n = prompt("EDITAR NOME:", list[idx].n);
            const t = prompt("EDITAR IDENTIFICAÇÃO:", list[idx].tel);
            if(n !== null) list[idx].n = n.toUpperCase();
            if(t !== null) list[idx].tel = t;
            this.save();
        },
        updateStatus(idx, val) {
            const list = UI.currentTab === 'reserva' ? this.data.reserva : this.data.ativos;
            if (val === 'mover_reserva') this.data.reserva.push({...this.data.ativos.splice(idx, 1)[0], s: 'disponivel'});
            else if (val === 'mover_ativos') this.data.ativos.push(this.data.reserva.splice(idx, 1)[0]);
            else if (val === 'ausente') { const j = prompt("JUSTIFICATIVA:"); list[idx].s = 'ausente'; list[idx].obs = j ? j.toUpperCase() : "AUSENTE"; }
            else { list[idx].s = val; list[idx].obs = ""; }
            this.save(); UI.toast("ESTADO_SINCRONIZADO");
        },
        resetShift() { if(confirm("REINICIAR ESCALA?")) { this.data.ativos.forEach(a => { if(a.s === 'escalado') a.s = 'disponivel'; }); this.save(); } }
    };

    const UI = {
        currentTab: 'rotina', chart: null,
        setTab(tab) {
            this.currentTab = tab;
            ['btnRotina','btnGeduc','btnReserva'].forEach(id => document.getElementById(id)?.classList.remove('active'));
            const btn = document.getElementById('btn' + tab.charAt(0).toUpperCase() + tab.slice(1));
            if(btn) btn.classList.add('active');
            this.render();
        },
        render() { 
            const corpo = document.getElementById('corpoTabela');
            let lista = this.currentTab === 'reserva' ? App.data.reserva : App.data.ativos;
            if(this.currentTab === 'rotina') lista = lista.filter(a => a.t !== 'GEDUC');
            if(this.currentTab === 'geduc') lista = App.data.ativos.filter(a => a.t === 'GEDUC');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            corpo.innerHTML = lista.filter(a => a.n.toLowerCase().includes(search)).map((a) => {
                const realIdx = (this.currentTab !== 'reserva') ? App.data.ativos.indexOf(a) : App.data.reserva.indexOf(a);
                return `<tr class="row-item status-${a.s}">
                    <td style="padding: 18px 20px;" ondblclick="App.editAgent(${realIdx})">
                        <div class="agent-main" onclick="UI.copy('${a.n}',${realIdx},'n')">${a.n}</div>
                        <div class="agent-sub" onclick="UI.copy('${a.tel}',${realIdx},'t')">ID: ${a.tel} | ${a.bairro} | ${a.transp}</div>
                        ${a.obs?`<div style="font-size:0.45rem; color:var(--danger); font-weight:900; margin-top:4px;">! ${a.obs}</div>`:''}
                    </td>
                    <td style="text-align:right; padding-right:15px;">
                        <select onchange="App.updateStatus(${realIdx}, this.value)" style="background:transparent; border:none; font-weight:900; color:inherit; font-size:0.6rem; cursor:pointer;">
                            ${this.currentTab!=='reserva'?`<option value="disponivel" ${a.s==='disponivel'?'selected':''}>✓ DISP</option><option value="escalado" ${a.s==='escalado'?'selected':''}>⚐ ESCAL</option><option value="ausente" ${a.s==='ausente'?'selected':''}>⚠ AUSEN</option><option value="mover_reserva">➤ RESERVA</option>`:`<option value="mover_ativos">⟲ ATIVOS</option>`}
                        </select>
                    </td></tr>`}).join('');
            this.updateDash();
        },
        copy(txt, idx, type) {
            const e = window.event; e.stopPropagation(); 
            navigator.clipboard.writeText(txt);
            UI.toast(type === 'n' ? "NOME_CAPTURADO" : "FONE_CAPTURADO", type === 'n');
            if(type === 'n' && this.currentTab !== 'reserva' && App.data.ativos[idx].s === 'disponivel') App.updateStatus(idx, 'escalado');
        },
        updateDash() {
            const rotina = App.data.ativos.filter(a => a.t !== 'GEDUC');
            const total = rotina.length || 1;
            const esc = rotina.filter(a => a.s === 'escalado').length;
            const aus = rotina.filter(a => a.s === 'ausente').length;
            const disp = rotina.filter(a => a.s === 'disponivel').length;

            document.getElementById('valTotal').innerText = rotina.length;
            document.getElementById('valAusen').innerText = Math.round((aus/total)*100) + "%";
            document.getElementById('perAusen').innerText = "AUSENTES: " + aus;
            document.getElementById('valEscala').innerText = esc;
            document.getElementById('perEscala').innerText = Math.round((esc/total)*100) + "%_DO_TOTAL";
            document.getElementById('valDisp').innerText = disp;
            document.getElementById('perDisp').innerText = Math.round((disp/total)*100) + "%_DO_TOTAL";

            const colors = [document.body.getAttribute('data-theme')==='light'?'#248a3d':'#34c759', '#00b4ff', '#ff3b30'];
            if (!this.chart) {
                this.chart = new Chart(document.getElementById('statusChart').getContext('2d'), {
                    type: 'doughnut', data: { datasets: [{ data: [disp, esc, aus], backgroundColor: colors, borderWidth: 0 }] },
                    options: { cutout: '85%', plugins: { legend: { display: false } }, animation: { duration: 400 } }
                });
            } else { this.chart.data.datasets[0].data = [disp, esc, aus]; this.chart.update('none'); }
        },
        abrirLista(tipo) {
            const lista = App.data.ativos.filter(a => tipo === 'selecionados' ? a.s === 'escalado' : a.s === 'disponivel');
            document.getElementById('modalTitle').innerText = tipo === 'selecionados' ? "EQUIPE_ESCALADA" : "EQUIPE_REMANESCENTE";
            document.getElementById('reportList').innerText = lista.map(a => `• ${a.n} (${a.t})`).join('\n') || "SEM_REGISTROS";
            document.getElementById('modalReports').style.display = 'block';
        },
        toast(m, showUndo = true) { 
            const t = document.getElementById('toast'); document.getElementById('toastMsg').innerText = m;
            document.getElementById('undoBtn').style.display = showUndo ? 'inline-block' : 'none';
            t.style.display='block'; setTimeout(()=>t.style.display='none', 4000); 
        }
    };
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); UI.render(); }
    function exportarDados() { const b = new Blob([JSON.stringify(App.data)], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'vl_gold_v9.json'; a.click(); }
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
    UI.render();
</script>
</body>
</html>
